services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: west_santo_travel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d west_santo_travel"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    command: start-dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/west_santo_travel?schema=public}
      AUTH_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
      AUTH_URL: ${APP_BASE_URL:-http://localhost:3000}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_URL:-http://keycloak:8080/realms/west-santo}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-west-santo-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-replace-with-keycloak-client-secret}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma db push --schema prisma/schema.prisma &&
      node prisma/seed.mjs &&
      npm run start --workspace apps/web"

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/west_santo_travel?schema=public}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_HEALTH_POLL_MS: ${BOT_HEALTH_POLL_MS:-60000}

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/west_santo_travel?schema=public}
      SCHEDULER_TICK_MS: ${SCHEDULER_TICK_MS:-60000}

volumes:
  postgres_data:
  keycloak_postgres_data:
